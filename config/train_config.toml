[model]
[model.shared]
latent_size = 48
patch_len = 3
transformation_dimension_size = 256
[model.encoder]
grid_size = 900
n_heads = 12
n_layers = 6
learning_rate = 0.003
tau = 0.85
chi = 0.9
activation=50
[model.transformer]
learning_rate = 0.001
alpha = 0.9
[model.encoder.downstream_attributes]
grid_size = {n_heads=4, output_sizes=[2, 30]}
num_colors = {n_heads=4, output_sizes=[1, 10]}
[model.encoder.contrastive_attributes]
roll = {task_type = "task_sensitive"}
scale_grid = {task_type = "task_sensitive"}
isolate_color = {task_type = "task_sensitive"}
rotate = {task_type = "task_insensitive"}
reflect = {task_type = "task_insensitive"}
color_map = {task_type = "task_insensitive"}

[training]
[training.shared]
dataset_path = "training"
[training.encoder]
batch_size = 125
epochs = 5000
[training.transformer]
batch_size = 1
epochs = 1